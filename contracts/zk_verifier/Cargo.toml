# ZK Verifier Contract Dependencies
# 
# This contract verifies zero-knowledge proofs generated by Noir circuits.
# Uses Protocol 26's BN254 host functions for efficient proof verification.
# Deploy this contract first, then pass its address to the payroll contract.

[package]
name = "zetapay-zk-verifier"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = { workspace = true }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }

[features]
testutils = ["soroban-sdk/testutils"]
